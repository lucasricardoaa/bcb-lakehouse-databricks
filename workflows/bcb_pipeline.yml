resources:
  jobs:
    bcb_pipeline:
      name: bcb_pipeline
      description: "Pipeline bcb-lakehouse-databricks: Bronze -> Silver -> Gold -> Quality Checks."
      max_concurrent_runs: 1
      tasks:
        - task_key: bronze_ingest
          description: "Ingere series BCB via API para a camada Bronze. MERGE INTO com chave (serie_id, data)."
          notebook_task:
            notebook_path: /Users/lucasricardoaa@lucasdevrj.onmicrosoft.com/bcb-lakehouse-databricks/notebooks/01_bronze_ingest
            base_parameters:
              data_inicio: ""
              data_fim: ""
            source: WORKSPACE

        - task_key: silver_transform
          description: "Transforma Bronze -> Silver: cast de tipos, remocao de nulos, MERGE INTO incremental."
          depends_on:
            - task_key: bronze_ingest
          notebook_task:
            notebook_path: /Users/lucasricardoaa@lucasdevrj.onmicrosoft.com/bcb-lakehouse-databricks/notebooks/02_silver_transform
            base_parameters:
              data_inicio: ""
              data_fim: ""
            source: WORKSPACE

        - task_key: gold_model
          description: "Constroi fct_indicadores e dim_data a partir da Silver. OPTIMIZE + ZORDER BY data."
          depends_on:
            - task_key: silver_transform
          notebook_task:
            notebook_path: /Users/lucasricardoaa@lucasdevrj.onmicrosoft.com/bcb-lakehouse-databricks/notebooks/03_gold_model
            base_parameters: {}
            source: WORKSPACE

        - task_key: quality_checks
          description: "15 assertions Python cobrindo Bronze, Silver e Gold. Falha interrompe o job."
          depends_on:
            - task_key: gold_model
          notebook_task:
            notebook_path: /Users/lucasricardoaa@lucasdevrj.onmicrosoft.com/bcb-lakehouse-databricks/notebooks/04_quality_checks
            base_parameters: {}
            source: WORKSPACE
